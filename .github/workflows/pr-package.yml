name: PR Package and Comment

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  package-and-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Check for issue number
        id: check_issue
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Write PR body via env var to avoid shell interpretation issues
          printf '%s' "$PR_BODY" > pr_body.txt

          # Case 1: full issue URL for current repository only.
          CURRENT_REPO_ISSUE_URL_REGEX="https://github.com/${REPO_OWNER}/${REPO_NAME}/issues/[0-9]+"
          if grep -qoE "$CURRENT_REPO_ISSUE_URL_REGEX" pr_body.txt; then
            ISSUE_NUM=$(grep -oE "$CURRENT_REPO_ISSUE_URL_REGEX" pr_body.txt | head -n 1 | grep -oE "[0-9]+$")
            echo "issue_number=${ISSUE_NUM}" >> $GITHUB_OUTPUT
            echo "has_issue=true" >> $GITHUB_OUTPUT
          else
            # Case 2: plain #123 only.
            # Exclude:
            # - bracketed forms like [#123]
            # - markdown links
            # - cross-repo shorthand like owner/repo#123
            sed -E 's/\[[^][]*\]\([^()]*\)//g; s/\[[^][]*\]//g; s@[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+#[0-9]+@@g' pr_body.txt > pr_body_for_plain_issue.txt

            if grep -qoE "#[0-9]+" pr_body_for_plain_issue.txt; then
              ISSUE_NUM=$(grep -oE "#[0-9]+" pr_body_for_plain_issue.txt | head -n 1 | tr -d '#')
              echo "issue_number=${ISSUE_NUM}" >> $GITHUB_OUTPUT
              echo "has_issue=true" >> $GITHUB_OUTPUT
            else
              echo "has_issue=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Get plugin filename
        id: get_filename
        run: |
          FILENAME=$(ls build/distributions/easy-yapi-*.zip | xargs basename)
          echo "plugin_filename=${FILENAME}" >> $GITHUB_OUTPUT

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_filename.outputs.plugin_filename }}
          path: build/distributions/easy-yapi-*.zip
          if-no-files-found: error

      - name: Comment on target issue
        if: steps.check_issue.outputs.has_issue == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const issueNumber = '${{ steps.check_issue.outputs.issue_number }}';
            const pluginFilename = '${{ steps.get_filename.outputs.plugin_filename }}';
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `A PR (#${pr.number}) has been opened to fix this issue. You can download the packaged plugin \`${pluginFilename}\` from the [GitHub Actions workflow run](${workflowRunUrl}) by clicking on the "Artifacts" dropdown.`
            });

      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            const pr = context.payload.pull_request;
            const pluginFilename = '${{ steps.get_filename.outputs.plugin_filename }}';
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: `📦 Plugin has been packaged for this PR. You can download \`${pluginFilename}\` from the [GitHub Actions workflow run](${workflowRunUrl}) by clicking on the "Artifacts" dropdown.`
            }); 
