name: 'Create Release'

on:
  push:
    branches:
      - master

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: extract_version
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          FULL_VERSION=""
          VERSION=$(echo "$COMMIT_MSG" | head -1 | grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+' | sed 's/^v//')

          if [ -f "build.gradle.kts" ]; then
            FULL_VERSION=$(grep '^version\s*=' build.gradle.kts | head -n1 | sed -E 's/.*"([^"]+)".*/\1/' | tr -d '\r' | xargs)
          fi

          if [ -z "$VERSION" ]; then
            if [ -z "$FULL_VERSION" ]; then
              echo "Error: No version found in build.gradle.kts"
              exit 1
            fi
            VERSION=$(echo "$FULL_VERSION" | sed -E 's/^v?([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')
          fi

          if [[ ! "$VERSION" =~ ^v ]]; then
            VERSION="v$VERSION"
          fi

          echo "Extracted version: $VERSION"
          echo "Full version: $FULL_VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git tag -l "${{ steps.extract_version.outputs.version }}" | grep -q "${{ steps.extract_version.outputs.version }}"; then
            echo "Tag ${{ steps.extract_version.outputs.version }} already exists. Skipping release creation."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag ${{ steps.extract_version.outputs.version }} does not exist. Proceeding with release creation."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK
        if: steps.check_tag.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Build Plugin
        if: steps.check_tag.outputs.skip == 'false'
        run: ./gradlew buildPlugin

      - name: Generate Release Notes
        if: steps.check_tag.outputs.skip == 'false'
        id: generate_notes
        run: |
          # Get the previous tag (if any)
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          CURRENT_TAG=${{ steps.extract_version.outputs.version }}
          
          # Generate the release notes
          if [ -n "$PREV_TAG" ]; then
            NOTES="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}\n\n"
            COMMITS=$(git log --pretty=format:"* %s" $PREV_TAG..HEAD | grep -E '^\* (refactor|feat|fix|perf|docs)' || true)
          else
            NOTES="**Initial Release**\n\n"
            COMMITS=$(git log --pretty=format:"* %s" | grep -E '^\* (refactor|feat|fix|perf|docs)' || true)
          fi
          
          # Add commit messages
          if [ -n "$COMMITS" ]; then
            NOTES="${NOTES}### Changes\n${COMMITS}\n\n"
          fi
          
          # Add the plugin support table
          NOTES="${NOTES}---\n\n"
          NOTES="${NOTES}### Downloads\n\n"
          NOTES="${NOTES}| Plugin | IDE Support |\n"
          NOTES="${NOTES}| ------ | ----------- |\n"
          # Use full version for the download link (e.g., easy-yapi-3.0.8.252.0.zip)
          FULL_VERSION=${{ steps.extract_version.outputs.full_version }}
          NOTES="${NOTES}| [easy-yapi-${FULL_VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/${CURRENT_TAG}/easy-yapi-${FULL_VERSION}.zip) | IntelliJ IDEA 2023.1+ |\n"
          
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo -e "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: contains(github.event.head_commit.message, 'release') && steps.check_tag.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.extract_version.outputs.version }}
          name: ${{ steps.extract_version.outputs.version }}
          body: ${{ steps.generate_notes.outputs.notes }}
          draft: true
          prerelease: true
          files: |
            build/distributions/easy-yapi-*.zip
